trigger:
  branches:
    include:
      - main

pr: none

variables:
  vmImageName: ubuntu-latest
  acrServiceConnection: weatherappres-acr-service-connection
  imageRepository: weather-app

  # SonarCloud (free tier)
  SONAR_HOST_URL: 'https://sonarcloud.io'
  SONAR_TOKEN: '63980db8660ea350206cfd86f5eb07619011982d'
  SONAR_PROJECT_KEY: 'brijesh9933_weatherApp'
  SONAR_ORGANIZATION: 'brijesh9933'




stages:
  - stage: Lint
    displayName: Lint
    jobs:
      - job: LintJob
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies
          - script: npm run lint
            displayName: Run ESLint

  - stage: UnitTests
    displayName: Unit tests
    dependsOn: Lint
    condition: succeeded()
    jobs:
      - job: TestJob
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies
          # Angular/Karma needs Chrome. This setup is commonly enough for Ubuntu agents.
          - bash: |
              set -euo pipefail
              sudo apt-get update
              sudo apt-get install -y google-chrome-stable
            displayName: Install Chrome
          - bash: |
              set -euo pipefail
              export CHROME_BIN=/usr/bin/google-chrome
              npm test -- --watch=false --browsers=ChromeHeadless --code-coverage=true
              # Enforce minimum coverage (overall line coverage)
              node scripts/coverage-check.js coverage/weather/lcov.info
            displayName: Run Karma tests (headless)

  - stage: Build_Dev
    displayName: Build (Dev)
    dependsOn: UnitTests
    condition: succeeded()
    jobs:
      - job: BuildDev
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies
          - bash: |
              set -euo pipefail
              npm run build:dev
            displayName: Angular build (dev)

  - stage: SonarCloud
    displayName: SonarCloud analysis (gate)
    dependsOn:
      - Lint
    condition: succeeded()
    jobs:
      - job: SonarCloud
        pool:
          vmImage: $(vmImageName)

        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies



          # SonarCloud analysis via plain CLI (free tier).
          # Required pipeline variables (set in Azure DevOps):
          # - SONAR_TOKEN (secret)
          # - SONAR_PROJECT_KEY
          # - SONAR_ORGANIZATION
          # Note: SONAR_HOST_URL is fixed to https://sonarcloud.io in the YAML variables.


          # Install deps + run tests once here so sonar has coverage available in this stage.
          - bash: |
              set -euo pipefail
              npm_config_loglevel=error

              sudo apt-get update
              sudo apt-get install -y google-chrome-stable
              export CHROME_BIN=/usr/bin/google-chrome

              npm ci

              npm test -- --watch=false --browsers=ChromeHeadless --code-coverage=true
              node scripts/coverage-check.js coverage/weather/lcov.info



              # Install sonar-scanner locally (no global agent tooling required)
              npm i --no-save sonar-scanner

              # Validate required env vars (fails fast with a clear message)
              if [ -z "${SONAR_TOKEN:-}" ]; then
                echo "ERROR: SONAR_TOKEN is required (create a SonarCloud token and set it as a secret pipeline variable).";
                exit 1;
              fi
              if [ -z "${SONAR_ORGANIZATION:-}" ]; then
                echo "ERROR: SONAR_ORGANIZATION is required (your SonarCloud organization slug, as shown in SonarCloud).";
                exit 1;
              fi
              if [ -z "${SONAR_PROJECT_KEY:-}" ]; then
                # Prefer pipeline variable if present; otherwise fallback to repo name.
                export SONAR_PROJECT_KEY="${BUILD_REPOSITORY_NAME:-weather}";
                echo "WARNING: SONAR_PROJECT_KEY not set; using fallback: ${SONAR_PROJECT_KEY}";
              fi

              # Helpful diagnostics (do NOT print token)
              echo "SonarCloud host: ${SONAR_HOST_URL}"
              echo "SonarCloud organization: ${SONAR_ORGANIZATION}"
              echo "SonarCloud projectKey: ${SONAR_PROJECT_KEY}"

              # Run analysis
              ./node_modules/.bin/sonar-scanner \
                -X \
                -Dsonar.host.url="$SONAR_HOST_URL" \
                -Dsonar.login="$SONAR_TOKEN" \
                -Dsonar.projectKey="$SONAR_PROJECT_KEY" \
                -Dsonar.projectName="$SONAR_PROJECT_KEY" \
                -Dsonar.organization="$SONAR_ORGANIZATION" \
                -Dsonar.javascript.lcov.reportPaths="coverage/weather/lcov.info"

            displayName: Sonar scanner (CLI)
            env:
              # Host is fixed for SonarCloud

              SONAR_HOST_URL: $(SONAR_HOST_URL)

              # Required: set these in Azure DevOps pipeline variables (mark SONAR_TOKEN as secret)
              SONAR_TOKEN: $(SONAR_TOKEN)
              SONAR_PROJECT_KEY: $(SONAR_PROJECT_KEY)
              SONAR_ORGANIZATION: $(SONAR_ORGANIZATION)






  - stage: Build_Prod
    displayName: Build (Production)
    dependsOn: Build_Dev
    condition: succeeded()
    jobs:
      - job: BuildProd
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies
          - bash: |
              set -euo pipefail
              npm run build:prod
            displayName: Angular build (production)


# Publish Docker after quality passes.
  - stage: Docker_Publish

    displayName: Docker publish (ACR)
    dependsOn: Build_Prod
    condition: succeeded()
    jobs:
      - job: Docker
        displayName: Build and push image
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
            fetchDepth: 0
            persistCredentials: true

          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSpec: '20.x'

          - bash: |
              set -euo pipefail

              VERSION="$(node -p "require('./package.json').version")"
              SHORT_SHA="$(git rev-parse --short HEAD)"
              RELEASE_TAG="v${VERSION}"

              echo "Package version: ${VERSION}"
              echo "Commit tag: ${SHORT_SHA}"
              echo "Release tag: ${RELEASE_TAG}"

              echo "##vso[task.setvariable variable=packageVersion]${VERSION}"
              echo "##vso[task.setvariable variable=shortSha]${SHORT_SHA}"
              echo "##vso[task.setvariable variable=releaseTag]${RELEASE_TAG}"
            displayName: Read package version

          - task: Docker@2
            displayName: Build and push image
            inputs:
              command: buildAndPush
              containerRegistry: $(acrServiceConnection)
              repository: $(imageRepository)
              Dockerfile: Dockerfile
              buildContext: .
              tags: |
                $(releaseTag)
                $(shortSha)
                latest

          - bash: |
              set -euo pipefail

              git config user.email "azure-pipelines@local"
              git config user.name "Azure Pipelines"

              if git rev-parse "$(releaseTag)" >/dev/null 2>&1; then
                echo "Git tag $(releaseTag) already exists locally."
                exit 0
              fi

              if git ls-remote --tags origin "refs/tags/$(releaseTag)" | grep "$(releaseTag)"; then
                echo "Git tag $(releaseTag) already exists on origin."
                exit 0
              fi

              git tag -a "$(releaseTag)" -m "Release $(releaseTag)"
              git push origin "$(releaseTag)"
            displayName: Create Git version tag


