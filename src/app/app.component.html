<div class="app-shell">
  <nav class="navbar" aria-label="Primary navigation">
    <a routerLink="/home" routerLinkActive="active">Home</a>
    <a routerLink="/weather" routerLinkActive="active">Weather</a>
    <a routerLink="/favorites" routerLinkActive="active">Favorites</a>
    <a routerLink="/profile" routerLinkActive="active">Profile</a>

    <div class="nav-actions">
      <button *ngIf="!authService.isLoggedIn" (click)="login()">
        Login
      </button>

      <button *ngIf="authService.isLoggedIn" (click)="logout()">
        Logout
      </button>
    </div>
  </nav>

  <main class="page-content">
    <router-outlet></router-outlet>
  </main>
</div>
