trigger:
  branches:
    include:
      - dev
      - test
      - main

pr: none

variables:
  - group: weather-secrets

  # Defaults to keep Azure DevOps YAML validation from failing when variable group values are missing.
  # These can be overridden by the variable group `weather-secrets`.
  - name: imageRepository
    value: weatherapp/placeholder

  - name: containerRegistry
    value: weatherapp-acr-placeholder-service-connection

  # Backward-compatibility alias in case the variable name is referenced elsewhere.
  - name: dockerRegistryServiceConnection
    value: $(containerRegistry)

  - name: vmImageName
    value: ubuntu-latest

  - name: dockerfilePath
    value: $(Build.SourcesDirectory)/Dockerfile

  - name: imageTag
    value: $(Build.BuildId)

  - name: resourceGroup
    value: WeatherApp_group

  - name: devAppService
    value: weatherapp-dev

  - name: testAppService
    value: weatherapp-test

  - name: prodAppService
    value: weatherappweb


stages:

# ============================================================
# LINT
# ============================================================

- stage: Lint
  displayName: Lint

  jobs:
    - job: Lint
      pool:
        vmImage: $(vmImageName)

      steps:
        - checkout: self

        - task: NodeTool@0
          inputs:
            versionSpec: '20.x'

        - script: npm ci
          displayName: Install dependencies

        - script: npm run lint
          displayName: Run ESLint

# ============================================================
# UNIT TESTS
# ============================================================

- stage: UnitTests
  displayName: Unit Tests
  dependsOn: Lint

  jobs:
    - job: UnitTests

      pool:
        vmImage: $(vmImageName)

      steps:
        - checkout: self

        - task: NodeTool@0
          inputs:
            versionSpec: '20.x'

        - script: npm ci
          displayName: Install dependencies

        - bash: |
            sudo apt-get update
            sudo apt-get install -y google-chrome-stable
          displayName: Install Chrome

        - bash: |
            export CHROME_BIN=/usr/bin/google-chrome

            npm test -- \
              --watch=false \
              --browsers=ChromeHeadless \
              --code-coverage=true

            node scripts/coverage-check.js coverage/weather/lcov.info
          displayName: Run Tests

        - task: PublishCodeCoverageResults@1
          inputs:
            codeCoverageTool: Cobertura
            summaryFileLocation: $(System.DefaultWorkingDirectory)/coverage/weather/cobertura-coverage.xml
            reportDirectory: $(System.DefaultWorkingDirectory)/coverage

# ============================================================
# SONARCLOUD
# ============================================================

- stage: SonarCloud
  displayName: SonarCloud
  dependsOn: UnitTests

  jobs:
    - job: SonarCloud

      pool:
        vmImage: $(vmImageName)

      steps:
        - checkout: self

        - task: NodeTool@0
          inputs:
            versionSpec: '20.x'

        - script: npm ci
          displayName: Install dependencies

        - bash: |
            npm i --no-save sonar-scanner

            ./node_modules/.bin/sonar-scanner \
              -Dsonar.host.url=$(SONAR_HOST_URL) \
              -Dsonar.login=$(SONAR_TOKEN) \
              -Dsonar.projectKey=$(SONAR_PROJECT_KEY) \
              -Dsonar.organization=$(SONAR_ORGANIZATION) \
              -Dsonar.javascript.lcov.reportPaths=coverage/weather/lcov.info
          displayName: Sonar Scan

# ============================================================
# BUILD
# ============================================================

- stage: Build
  displayName: Angular Build
  dependsOn: SonarCloud

  jobs:
    - job: Build

      pool:
        vmImage: $(vmImageName)

      steps:
        - checkout: self

        - task: NodeTool@0
          inputs:
            versionSpec: '20.x'

        - script: npm ci
          displayName: Install dependencies

        - script: npm run build:prod
          displayName: Angular Production Build

# ============================================================
# DOCKER
# ============================================================

- stage: DockerPush
  displayName: Docker Build & Push
  dependsOn: Build

  jobs:
    - job: Docker

      pool:
        vmImage: $(vmImageName)

      steps:
        - checkout: self

        - task: Docker@2
          displayName: Build and Push Docker Image

          inputs:
            command: buildAndPush
            repository: $(imageRepository)
            dockerfile: $(dockerfilePath)
            containerRegistry: $(containerRegistry)

            tags: |
              $(imageTag)
              latest

# ============================================================
# DEV DEPLOYMENT
# ============================================================

- stage: Deploy_DEV
  displayName: Deploy DEV

  dependsOn: DockerPush

  condition: and(
    succeeded(),
    eq(variables['Build.SourceBranchName'], 'dev')
  )

  jobs:
    - deployment: DeployDEV

      environment: dev

      strategy:
        runOnce:
          deploy:

            steps:
              - task: AzureCLI@2

                inputs:
                  azureSubscription: weatherappres-acr-service-connection
                  scriptType: bash
                  scriptLocation: inlineScript

                  inlineScript: |
                    az webapp config container set \
                      --name $(devAppService) \
                      --resource-group $(resourceGroup) \
                      --docker-custom-image-name $(containerRegistry)/$(imageRepository):$(imageTag)

# ============================================================
# TEST DEPLOYMENT
# ============================================================

- stage: Deploy_TEST
  displayName: Deploy TEST

  dependsOn: DockerPush

  condition: and(
    succeeded(),
    eq(variables['Build.SourceBranchName'], 'test')
  )

  jobs:
    - deployment: DeployTEST

      environment: test

      strategy:
        runOnce:
          deploy:

            steps:
              - task: AzureCLI@2

                inputs:
                  azureSubscription: weatherappres-acr-service-connection
                  scriptType: bash
                  scriptLocation: inlineScript

                  inlineScript: |
                    az webapp config container set \
                      --name $(testAppService) \
                      --resource-group $(resourceGroup) \
                      --docker-custom-image-name $(containerRegistry)/$(imageRepository):$(imageTag)

# ============================================================
# PROD DEPLOYMENT
# ============================================================

- stage: Deploy_PROD
  displayName: Deploy PROD

  dependsOn: DockerPush

  condition: and(
    succeeded(),
    eq(variables['Build.SourceBranchName'], 'main')
  )

  jobs:
    - deployment: DeployPROD

      environment: prod

      strategy:
        runOnce:
          deploy:

            steps:
              - task: AzureCLI@2

                inputs:
                  azureSubscription: weatherappres-acr-service-connection
                  scriptType: bash
                  scriptLocation: inlineScript

                  inlineScript: |
                    az webapp config container set \
                      --name $(prodAppService) \
                      --resource-group $(resourceGroup) \
                      --docker-custom-image-name $(containerRegistry)/$(imageRepository):$(imageTag)