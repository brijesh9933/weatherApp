trigger:
  branches:
    include:
      - main

pr: none

resources:
  - repo: self

variables:
  - group: weather-secrets
  - name: vmImageName
    value: ubuntu-latest
  - name: dockerfilePath
    value: $(Build.SourcesDirectory)/Dockerfile
  - name: imageTag
    value: $(Build.BuildId)

stages:
  - stage: Lint
    displayName: Lint
    jobs:
      - job: LintJob
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies
          - script: npm run lint
            displayName: Run ESLint

  - stage: UnitTests
    displayName: Unit tests
    dependsOn: Lint
    condition: succeeded()
    jobs:
      - job: TestJob
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies
          - bash: |
              set -euo pipefail
              sudo apt-get update
              sudo apt-get install -y google-chrome-stable
            displayName: Install Chrome
          - bash: |
              set -euo pipefail
              export CHROME_BIN=/usr/bin/google-chrome
              npm test -- --watch=false --browsers=ChromeHeadless --code-coverage=true
              node scripts/coverage-check.js coverage/weather/lcov.info
            displayName: Run Karma tests (headless)
          - task: PublishCodeCoverageResults@1
            displayName: Publish code coverage results
            inputs:
              codeCoverageTool: Cobertura
              summaryFileLocation: coverage/weather/cobertura-coverage.xml
              reportDirectory: coverage/weather
              failIfCoverageEmpty: true

  - stage: Build_Dev
    displayName: Build (Dev)
    dependsOn: UnitTests
    condition: succeeded()
    jobs:
      - job: BuildDev
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies
          - bash: npm run build:dev
            displayName: Angular build (dev)

  - stage: SonarCloud
    displayName: SonarCloud analysis (gate)
    dependsOn: Lint
    condition: succeeded()
    jobs:
      - job: SonarCloud
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies
          - bash: |
              set -euo pipefail
              sudo apt-get update
              sudo apt-get install -y google-chrome-stable
              export CHROME_BIN=/usr/bin/google-chrome

              npm ci
              npm test -- --watch=false --browsers=ChromeHeadless --code-coverage=true
              node scripts/coverage-check.js coverage/weather/lcov.info

              npm i --no-save sonar-scanner

              ./node_modules/.bin/sonar-scanner \
                -Dsonar.host.url="$(SONAR_HOST_URL)" \
                -Dsonar.login="$(SONAR_TOKEN)" \
                -Dsonar.projectKey="$(SONAR_PROJECT_KEY)" \
                -Dsonar.projectName="$(SONAR_PROJECT_KEY)" \
                -Dsonar.organization="$(SONAR_ORGANIZATION)" \
                -Dsonar.javascript.lcov.reportPaths="coverage/weather/lcov.info"
            displayName: Sonar scanner (CLI)
            env:
              SONAR_HOST_URL: $(SONAR_HOST_URL)
              SONAR_TOKEN: $(SONAR_TOKEN)
              SONAR_PROJECT_KEY: $(SONAR_PROJECT_KEY)
              SONAR_ORGANIZATION: $(SONAR_ORGANIZATION)

  - stage: Build_Prod
    displayName: Build (Production)
    dependsOn: Build_Dev
    condition: succeeded()
    jobs:
      - job: BuildProd
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - task: NodeTool@0
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies
          - bash: npm run build:prod
            displayName: Angular build (production)

  - stage: DockerPush
    displayName: Build and push Docker image
    dependsOn: Build_Prod
    condition: succeeded()
    jobs:
      - job: DockerPushJob
        pool:
          vmImage: $(vmImageName)
        steps:
          - task: Docker@2
            displayName: Build and push image to ACR
            inputs:
              command: buildAndPush
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(imageTag)
                latest

  - stage: Deploy_AppService
    displayName: Deploy to Azure App Service
    dependsOn: DockerPush
    condition: succeeded()
    jobs:
      - job: DeployJob
        pool:
          vmImage: $(vmImageName)
        steps:
          - task: AzureCLI@2
            displayName: Update App Service container image
            inputs:
              azureSubscription: $(acrServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                set -euo pipefail
                az webapp config container set \
                  --name weatherappweb \
                  --resource-group WeatherApp_group \
                  --docker-custom-image-name $(containerRegistry)/$(imageRepository):$(imageTag)
