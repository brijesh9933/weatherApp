trigger:
   branches:
    include:
      - dev
      - test
      - main

pr: none

resources:
  - repo: self

parameters:
  - name: runLint
    type: boolean
    default: true
  - name: runTests
    type: boolean
    default: true
  - name: runSonar
    type: boolean
    default: false

  - name: deployDev
    type: boolean
    default: false
  - name: deployTest
    type: boolean
    default: false
  - name: deployProd
    type: boolean
    default: false



variables:
  - group: weather-secrets
  - name: vmImageName
    value: ubuntu-latest
  - name: dockerfilePath
    value: $(Build.SourcesDirectory)/Dockerfile
  - name: imageTag
    value: $(Build.BuildId)
  - name: resourceGroup
    value: WeatherApp_group

  - name: devAppService
    value: weatherapp-dev

  - name: testAppService
    value: weatherapp-test

  - name: prodAppService
    value: weatherappweb

stages:
  - stage: Lint
    displayName: Lint
    condition: eq(${{ parameters.runLint }}, true)
    jobs:
      - job: LintJob
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies
          - script: npm run lint
            displayName: Run ESLint

  - stage: UnitTests
    displayName: Unit tests
    dependsOn: Lint
    condition: and(succeeded(), eq(${{ parameters.runTests }}, true))
    jobs:
      - job: TestJob
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies
          # Angular/Karma needs Chrome. This setup is commonly enough for Ubuntu agents.
          - bash: |
              set -euo pipefail
              sudo apt-get update
              sudo apt-get install -y google-chrome-stable
            displayName: Install Chrome
          - bash: |
              set -euo pipefail
              export CHROME_BIN=/usr/bin/google-chrome
              npm test -- --watch=false --browsers=ChromeHeadless --code-coverage=true
              node scripts/coverage-check.js coverage/weather/lcov.info
            displayName: Run Karma tests (headless)
          - task: PublishCodeCoverageResults@1
            displayName: Publish code coverage results
            inputs:
              codeCoverageTool: Cobertura
              summaryFileLocation: $(System.DefaultWorkingDirectory)/coverage/weather/cobertura-coverage.xml
              reportDirectory: $(System.DefaultWorkingDirectory)/coverage

  - stage: Build_Dev
    displayName: Build (Dev)
    dependsOn: UnitTests
    condition: and(succeeded(), eq(${{ parameters.buildDev }}, true), eq(variables['Build.SourceBranch'], 'refs/heads/dev'))
    jobs:
      - job: BuildDev
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies
          - bash: |
              set -euo pipefail
              npm run build:dev
            displayName: Angular build (dev)

  - stage: Build_Test
    displayName: Build (Test)
    dependsOn: UnitTests
    condition: and(succeeded(), eq(${{ parameters.buildTest }}, true), eq(variables['Build.SourceBranch'], 'refs/heads/test'))
    jobs:
      - job: BuildTest
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies
          - bash: |
              set -euo pipefail
              npm run build:test
            displayName: Angular build (test)

  - stage: SonarCloud
    displayName: SonarCloud analysis (gate)
    dependsOn:
      - Lint
    condition: and(succeeded(), eq(${{ parameters.runSonar }}, true))
    jobs:
      - job: SonarCloud
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies

          # Install deps + run tests once here so sonar has coverage available in this stage.
          - bash: |
              set -euo pipefail
              npm_config_loglevel=error

              sudo apt-get update
              sudo apt-get install -y google-chrome-stable
              export CHROME_BIN=/usr/bin/google-chrome

              npm ci

              npm test -- --watch=false --browsers=ChromeHeadless --code-coverage=true
              node scripts/coverage-check.js coverage/weather/lcov.info

              # Install sonar-scanner locally (no global agent tooling required)
              npm i --no-save sonar-scanner

              # Validate required env vars (fails fast with a clear message)
              if [ -z "${SONAR_TOKEN:-}" ]; then
                echo "ERROR: SONAR_TOKEN is required (create a SonarCloud token and set it as a secret pipeline variable)."
                exit 1
              fi
              if [ -z "${SONAR_ORGANIZATION:-}" ]; then
                echo "ERROR: SONAR_ORGANIZATION is required (your SonarCloud organization slug, as shown in SonarCloud)."
                exit 1
              fi
              if [ -z "${SONAR_PROJECT_KEY:-}" ]; then
                # Prefer pipeline variable if present; otherwise fallback to repo name.
                export SONAR_PROJECT_KEY="${BUILD_REPOSITORY_NAME:-weather}"
                echo "WARNING: SONAR_PROJECT_KEY not set; using fallback: ${SONAR_PROJECT_KEY}"
              fi

              # Helpful diagnostics (do NOT print token)
              echo "SonarCloud host: ${SONAR_HOST_URL}"
              echo "SonarCloud organization: ${SONAR_ORGANIZATION}"
              echo "SonarCloud projectKey: ${SONAR_PROJECT_KEY}"

              # Run analysis
              ./node_modules/.bin/sonar-scanner \
                -X \
                -Dsonar.host.url="$SONAR_HOST_URL" \
                -Dsonar.login="$SONAR_TOKEN" \
                -Dsonar.projectKey="$SONAR_PROJECT_KEY" \
                -Dsonar.projectName="$SONAR_PROJECT_KEY" \
                -Dsonar.organization="$SONAR_ORGANIZATION" \
                -Dsonar.javascript.lcov.reportPaths="coverage/weather/lcov.info"
            displayName: Sonar scanner (CLI)
            env:
              SONAR_HOST_URL: $(SONAR_HOST_URL)
              SONAR_TOKEN: $(SONAR_TOKEN)
              SONAR_PROJECT_KEY: $(SONAR_PROJECT_KEY)
              SONAR_ORGANIZATION: $(SONAR_ORGANIZATION)

  - stage: Build_Prod
    displayName: Build (Production)
    dependsOn:
      - Build_Dev
      - Build_Test
    condition: and(succeeded(), eq(${{ parameters.buildProd }}, true), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: BuildProd
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - task: NodeTool@0
            displayName: Use Node.js
            inputs:
              versionSpec: '20.x'
          - script: npm ci
            displayName: Install dependencies
          - bash: |
              set -euo pipefail
              npm run build:prod
            displayName: Angular build (production)







  - stage: DockerBuildAndPush
    displayName: Build and push Docker image (single build)
    dependsOn:
      - Build_Dev
      - Build_Test
      - Build_Prod
    # Only run if at least one build stage was selected AND succeeded.
    condition: and(succeeded(), or(eq(${{ parameters.buildDev }}, true), eq(${{ parameters.buildTest }}, true), eq(${{ parameters.buildProd }}, true)))
    jobs:
      - job: DockerBuildAndPushJob
        displayName: Docker buildAndPush
        pool:
          vmImage: $(vmImageName)
        steps:
          - checkout: self
          - task: Docker@2
            displayName: Build and push an image to container registry
            inputs:
              command: buildAndPush
              repository: $(imageRepository)
              dockerfile: $(dockerfilePath)
              containerRegistry: $(dockerRegistryServiceConnection)
              tags: |
                $(imageTag)
                dev
                test
                latest

  - stage: Deploy_DEV
    displayName: Deploy dev
    dependsOn:
      - DockerBuildAndPush
    condition: and(succeeded(), eq(${{ parameters.deployDev }}, true), eq(variables['Build.SourceBranch'], 'refs/heads/dev'))
    jobs:
      - deployment: Deploydev
        environment: dev
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: Deploy dev
                  inputs:
                    azureSubscription: weatherappres-acr-service-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az webapp config container set \
                        --name $(devAppService) \
                        --resource-group $(resourceGroup) \
                        --docker-custom-image-name $(containerRegistry)/$(imageRepository):$(imageTag)

  - stage: Deploy_TEST
    displayName: Deploy test
    dependsOn:
      - DockerBuildAndPush
    condition: and(succeeded(), eq(${{ parameters.deployTest }}, true), eq(variables['Build.SourceBranch'], 'refs/heads/test'))
    jobs:
      - deployment: Deploytest
        environment: test
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: Deploy test
                  inputs:
                    azureSubscription: weatherappres-acr-service-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az webapp config container set \
                        --name $(testAppService) \
                        --resource-group $(resourceGroup) \
                        --docker-custom-image-name $(containerRegistry)/$(imageRepository):$(imageTag)

  - stage: Deploy_PROD
    displayName: Deploy prod
    dependsOn:
      - DockerBuildAndPush
    condition: and(succeeded(), eq(${{ parameters.deployProd }}, true), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: Deployprod
        environment: prod
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureCLI@2
                  displayName: Deploy prod
                  inputs:
                    azureSubscription: weatherappres-acr-service-connection
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az webapp config container set \
                        --name $(prodAppService) \
                        --resource-group $(resourceGroup) \
                        --docker-custom-image-name $(containerRegistry)/$(imageRepository):$(imageTag)

