trigger:
  branches:
    include:
      - dev
      - test
      - main

pr: none

pool:
  vmImage: 'ubuntu-latest'

stages:

- stage: Terraform_Plan
  displayName: 'Terraform Plan'

  jobs:
  - job: TerraformPlan
    displayName: 'Terraform Plan'

    steps:

    - checkout: self

    - bash: |
        set -euo pipefail

        TERRAFORM_VERSION="1.15.6"
        OS="linux"
        ARCH="amd64"

        echo "Installing Terraform ${TERRAFORM_VERSION}..."

        curl -sSL -o terraform.zip \
          "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_${OS}_${ARCH}.zip"

        sudo rm -rf /tmp/terraform-install
        mkdir -p /tmp/terraform-install

        unzip -q terraform.zip -d /tmp/terraform-install

        sudo mv /tmp/terraform-install/terraform /usr/local/bin/terraform

        terraform version
      displayName: 'Install Terraform'

    - task: AzureCLI@2
      displayName: 'Bootstrap Terraform Backend'
      inputs:
        azureSubscription: 'Azure subscription 1 (b7a31e2a-65b9-4c9d-90df-6dc6a8301e24)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          BACKEND_RG="WeatherApp_group_tf"
          BACKEND_STORAGE_ACCOUNT="weatherapptfstate01"
          BACKEND_CONTAINER="tfstate"

          az group show --name "${BACKEND_RG}" >/dev/null 2>&1 || \
          az group create \
            --name "${BACKEND_RG}" \
            --location "Central India" >/dev/null

          az storage account show \
            --name "${BACKEND_STORAGE_ACCOUNT}" \
            --resource-group "${BACKEND_RG}" >/dev/null 2>&1 || \
          az storage account create \
            --name "${BACKEND_STORAGE_ACCOUNT}" \
            --resource-group "${BACKEND_RG}" \
            --location "Central India" \
            --sku Standard_LRS \
            --kind StorageV2 >/dev/null

          az storage container show \
            --name "${BACKEND_CONTAINER}" \
            --account-name "${BACKEND_STORAGE_ACCOUNT}" \
            --auth-mode login >/dev/null 2>&1 || \
          az storage container create \
            --name "${BACKEND_CONTAINER}" \
            --account-name "${BACKEND_STORAGE_ACCOUNT}" \
            --auth-mode login \
            --public-access off >/dev/null

    - task: AzureCLI@2
      displayName: 'Terraform Init'
      inputs:
        azureSubscription: 'Azure subscription 1 (b7a31e2a-65b9-4c9d-90df-6dc6a8301e24)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform

          unset ARM_CLIENT_ID ARM_CLIENT_SECRET ARM_TENANT_ID || true
          export ARM_USE_AZURECLI_AUTH=true

          terraform init -input=false

    - task: AzureCLI@2
      displayName: 'Terraform Validate'
      inputs:
        azureSubscription: 'Azure subscription 1 (b7a31e2a-65b9-4c9d-90df-6dc6a8301e24)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform

          export ARM_USE_AZURECLI_AUTH=true

          terraform validate

    - task: AzureCLI@2
      displayName: 'Terraform Plan'
      inputs:
        azureSubscription: 'Azure subscription 1 (b7a31e2a-65b9-4c9d-90df-6dc6a8301e24)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          cd terraform

          BRANCH="$(Build.SourceBranch)"

          echo "Current Branch: ${BRANCH}"

          if [ "${BRANCH}" = "refs/heads/dev" ]; then

            terraform workspace select dev || terraform workspace new dev

            terraform plan \
              -input=false \
              -var-file="dev.tfvars" \
              -out=tfplan

          elif [ "${BRANCH}" = "refs/heads/test" ]; then

            terraform workspace select test || terraform workspace new test

            terraform plan \
              -input=false \
              -var-file="test.tfvars" \
              -out=tfplan

          else

            terraform workspace select prod || terraform workspace new prod

            terraform plan \
              -input=false \
              -var-file="prod.tfvars" \
              -out=tfplan

          fi

    - publish: terraform/tfplan
      artifact: tfplan

- stage: Terraform_Apply
  displayName: 'Terraform Apply'
  dependsOn: Terraform_Plan
  condition: succeeded()

  jobs:
  - job: TerraformApply
    displayName: 'Terraform Apply'

    steps:

    - checkout: self

    - download: current
      artifact: tfplan

    - bash: |
        echo "===== PIPELINE WORKSPACE ====="
        find "$PIPELINE_WORKSPACE" -type f | sort

        echo ""
        echo "===== SOURCES DIRECTORY ====="
        find "$BUILD_SOURCESDIRECTORY" -type f | sort
      displayName: 'Debug Artifact Location'