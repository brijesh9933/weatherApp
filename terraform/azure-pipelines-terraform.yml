trigger:
  branches:
    include:
      - dev
      - test
      - main

pr: none

pool:
  vmImage: 'ubuntu-latest'

stages:

- stage: Terraform_Plan
  displayName: 'Terraform Plan'

  jobs:
  - job: TerraformPlan

    steps:

    - checkout: self

    - bash: |
        set -euo pipefail
        TERRAFORM_VERSION="1.15.6"

        OS="linux"
        ARCH="amd64"
        echo "Installing Terraform ${TERRAFORM_VERSION}..."
        curl -sSL -o terraform.zip "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_${OS}_${ARCH}.zip"
        sudo rm -rf /tmp/terraform-install && mkdir -p /tmp/terraform-install
        unzip -q terraform.zip -d /tmp/terraform-install
        sudo mv /tmp/terraform-install/terraform /usr/local/bin/terraform
        terraform version
      displayName: 'Install Terraform (script)'

    - task: AzureCLI@2
      displayName: 'Bootstrap Terraform backend (azurerm)'
      inputs:
        azureSubscription: 'Azure subscription 1 (b7a31e2a-65b9-4c9d-90df-6dc6a8301e24)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          BACKEND_RG="WeatherApp_group_tf"
          BACKEND_STORAGE_ACCOUNT="weatherapptfstate01"
          BACKEND_CONTAINER="tfstate"

          echo "Ensuring backend RG exists: ${BACKEND_RG}"
          az group show --name "${BACKEND_RG}" >/dev/null 2>&1 || az group create --name "${BACKEND_RG}" --location "Central India" >/dev/null

          echo "Ensuring backend storage account exists: ${BACKEND_STORAGE_ACCOUNT}"
          az storage account show --name "${BACKEND_STORAGE_ACCOUNT}" --resource-group "${BACKEND_RG}" >/dev/null 2>&1 || \
            az storage account create \
              --name "${BACKEND_STORAGE_ACCOUNT}" \
              --resource-group "${BACKEND_RG}" \
              --location "Central India" \
              --sku "Standard_LRS" \
              --kind "StorageV2" \
              >/dev/null

          echo "Ensuring backend container exists: ${BACKEND_CONTAINER}"
          az storage container show --name "${BACKEND_CONTAINER}" --account-name "${BACKEND_STORAGE_ACCOUNT}" --auth-mode login >/dev/null 2>&1 || \
            az storage container create \
              --name "${BACKEND_CONTAINER}" \
              --account-name "${BACKEND_STORAGE_ACCOUNT}" \
              --auth-mode login \
              --public-access off >/dev/null

    - task: AzureCLI@2
      displayName: 'Terraform Init'
      inputs:
        azureSubscription: 'Azure subscription 1 (b7a31e2a-65b9-4c9d-90df-6dc6a8301e24)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform

          terraform version

          # Force Terraform/AzureRM to use Azure CLI auth from the AzureCLI@2 task.
          unset ARM_CLIENT_ID ARM_CLIENT_SECRET ARM_TENANT_ID AZURE_CLIENT_ID AZURE_CLIENT_SECRET AZURE_TENANT_ID TF_VAR_client_id TF_VAR_client_secret TF_VAR_tenant_id TF_VAR_subscription_id || true
          export ARM_USE_AZURECLI_AUTH=true
          export ARM_SUBSCRIPTION_ID="${AZURE_SUBSCRIPTION_ID:-}" || true

          terraform init -input=false

    - task: AzureCLI@2
      displayName: 'Terraform Validate'
      inputs:
        azureSubscription: 'Azure subscription 1 (b7a31e2a-65b9-4c9d-90df-6dc6a8301e24)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform

          unset ARM_CLIENT_ID ARM_CLIENT_SECRET ARM_TENANT_ID AZURE_CLIENT_ID AZURE_CLIENT_SECRET AZURE_TENANT_ID TF_VAR_client_id TF_VAR_client_secret TF_VAR_tenant_id TF_VAR_subscription_id || true
          export ARM_USE_AZURECLI_AUTH=true

          terraform validate

    - task: AzureCLI@2
      displayName: 'Terraform Plan'
      inputs:
        azureSubscription: 'Azure subscription 1 (b7a31e2a-65b9-4c9d-90df-6dc6a8301e24)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform

          terraform plan -input=false -out=tfplan

    - publish: terraform/tfplan
      artifact: tfplan

- stage: Terraform_Apply
  displayName: 'Terraform Apply'
  dependsOn: Terraform_Plan
  condition: succeeded()

  jobs:
  - job: TerraformApply

    steps:

    - checkout: self

    - download: current
      artifact: tfplan

    - bash: |
        set -euo pipefail

        TERRAFORM_VERSION="1.15.6"

        curl -sSL -o terraform.zip "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"

        sudo rm -rf /tmp/terraform-install
        mkdir -p /tmp/terraform-install

        unzip -q terraform.zip -d /tmp/terraform-install

        sudo mv /tmp/terraform-install/terraform /usr/local/bin/terraform

        terraform version
      displayName: 'Install Terraform'

    - task: AzureCLI@2
      displayName: 'Terraform Apply'
      inputs:
        azureSubscription: 'Azure subscription 1 (b7a31e2a-65b9-4c9d-90df-6dc6a8301e24)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          # Downloaded artifact is placed under the pipeline workspace.
          # We standardize it so terraform apply can always reference ./tfplan.
          TFPLAN_PATH="${PIPELINE_WORKSPACE:-$SYSTEM_DEFAULTWORKINGDIRECTORY}/tfplan/tfplan"
          echo "Looking for tfplan at: ${TFPLAN_PATH}"
          ls -la "$(dirname "${TFPLAN_PATH}")" || true
          test -f "${TFPLAN_PATH}"

          cp -f "${TFPLAN_PATH}" ./tfplan

          cd terraform

          terraform init -input=false

          terraform apply -input=false -auto-approve tfplan
