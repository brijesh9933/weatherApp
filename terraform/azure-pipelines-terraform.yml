trigger:
  branches:
    include:
      - dev
      - test
      - main

pr: none

pool:
  vmImage: 'ubuntu-latest'

stages:

- stage: Terraform_Plan
  displayName: 'Terraform Plan'

  jobs:
  - job: TerraformPlan
    displayName: 'Terraform Plan'

    steps:

    - checkout: self
      fetchDepth: 0
      persistCredentials: true

    - bash: |
        set -euo pipefail

        TERRAFORM_VERSION="1.15.6"
        OS="linux"
        ARCH="amd64"

        echo "Installing Terraform ${TERRAFORM_VERSION}..."

        curl -sSL -o terraform.zip \
          "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_${OS}_${ARCH}.zip"

        sudo rm -rf /tmp/terraform-install
        mkdir -p /tmp/terraform-install

        unzip -q terraform.zip -d /tmp/terraform-install

        sudo mv /tmp/terraform-install/terraform /usr/local/bin/terraform

        terraform version
      displayName: 'Install Terraform'

    - task: AzureCLI@2
      displayName: 'Bootstrap Terraform Backend'
      inputs:
        azureSubscription: 'Azure subscription 1 (b7a31e2a-65b9-4c9d-90df-6dc6a8301e24)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          BACKEND_RG="WeatherApp_group_tf"
          BACKEND_STORAGE_ACCOUNT="weatherapptfstate01"
          BACKEND_CONTAINER="tfstate"

          az group show --name "${BACKEND_RG}" >/dev/null 2>&1 || \
          az group create \
            --name "${BACKEND_RG}" \
            --location "Central India" >/dev/null

          az storage account show \
            --name "${BACKEND_STORAGE_ACCOUNT}" \
            --resource-group "${BACKEND_RG}" >/dev/null 2>&1 || \
          az storage account create \
            --name "${BACKEND_STORAGE_ACCOUNT}" \
            --resource-group "${BACKEND_RG}" \
            --location "Central India" \
            --sku Standard_LRS \
            --kind StorageV2 >/dev/null

          az storage container show \
            --name "${BACKEND_CONTAINER}" \
            --account-name "${BACKEND_STORAGE_ACCOUNT}" \
            --auth-mode login >/dev/null 2>&1 || \
          az storage container create \
            --name "${BACKEND_CONTAINER}" \
            --account-name "${BACKEND_STORAGE_ACCOUNT}" \
            --auth-mode login \
            --public-access off >/dev/null

    - task: AzureCLI@2
      displayName: 'Terraform Init'
      inputs:
        azureSubscription: 'Azure subscription 1 (b7a31e2a-65b9-4c9d-90df-6dc6a8301e24)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform

          unset ARM_CLIENT_ID ARM_CLIENT_SECRET ARM_TENANT_ID || true
          export ARM_USE_AZURECLI_AUTH=true

          terraform init -input=false

    - task: AzureCLI@2
      displayName: 'Terraform Validate'
      inputs:
        azureSubscription: 'Azure subscription 1 (b7a31e2a-65b9-4c9d-90df-6dc6a8301e24)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          cd terraform

          export ARM_USE_AZURECLI_AUTH=true

          terraform validate

    - task: AzureCLI@2
      displayName: 'Terraform Plan'
      inputs:
        azureSubscription: 'Azure subscription 1 (b7a31e2a-65b9-4c9d-90df-6dc6a8301e24)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          cd terraform

          BRANCH="$(Build.SourceBranch)"
          echo "Current Branch: ${BRANCH}"

          # Decide environment + var file based on branch
          TF_ENV=""
          TF_VAR_FILE=""

          if [ "${BRANCH}" = "refs/heads/dev" ]; then
            TF_ENV="dev"
            TF_VAR_FILE="dev.tfvars"
            terraform workspace select dev || terraform workspace new dev
          elif [ "${BRANCH}" = "refs/heads/test" ]; then
            TF_ENV="test"
            TF_VAR_FILE="test.tfvars"
            terraform workspace select test || terraform workspace new test
          else
            TF_ENV="prod"
            TF_VAR_FILE="prod.tfvars"
            terraform workspace select prod || terraform workspace new prod
          fi

          echo "Using Terraform env: ${TF_ENV}"
          echo "Using var file: ${TF_VAR_FILE}"

          echo "===== Terraform directory listing (to debug missing tfvars) ====="
          ls -la
          echo "===== Searching for tfvars files ====="
          find . -maxdepth 2 -type f -name "*.tfvars" -print

          VAR_ARG=""
          if [ -f "${TF_VAR_FILE}" ]; then
            echo "Using tfvars file: ${TF_VAR_FILE}"
            VAR_ARG="-var-file=${TF_VAR_FILE}"
          else
            echo "WARNING: tfvars file '${TF_VAR_FILE}' was not found in: $(pwd)." >&2
            echo "         Falling back to environment variables / Terraform variable defaults (no -var-file)." >&2
            echo "         Tip: ensure the tfvars file is checked in for the target branch (dev/test/main)." >&2
          fi

          terraform plan \
            -input=false \
            ${VAR_ARG} \
            -out=tfplan

    - publish: terraform/tfplan
      artifact: tfplan


- stage: Terraform_Apply
  displayName: 'Terraform Apply'
  dependsOn: Terraform_Plan
  condition: succeeded()

  jobs:
  - job: TerraformApply
    displayName: 'Terraform Apply'

    steps:

    - checkout: self

    - download: current
      artifact: tfplan

    - bash: |
        set -euo pipefail

        TERRAFORM_VERSION="1.15.6"

        curl -sSL -o terraform.zip \
          "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"

        sudo rm -rf /tmp/terraform-install
        mkdir -p /tmp/terraform-install

        unzip -q terraform.zip -d /tmp/terraform-install

        sudo mv /tmp/terraform-install/terraform /usr/local/bin/terraform

        terraform version
      displayName: 'Install Terraform'

    - task: AzureCLI@2
      displayName: 'Terraform Apply'
      inputs:
        azureSubscription: 'Azure subscription 1 (b7a31e2a-65b9-4c9d-90df-6dc6a8301e24)'
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          set -euo pipefail

          cd terraform

          export ARM_USE_AZURECLI_AUTH=true

          terraform init -input=false

          BRANCH="$(Build.SourceBranch)"

          if [ "${BRANCH}" = "refs/heads/dev" ]; then
            WORKSPACE="dev"
            TF_VAR_FILE="dev.tfvars"

          elif [ "${BRANCH}" = "refs/heads/test" ]; then
            WORKSPACE="test"
            TF_VAR_FILE="test.tfvars"

          elif [ "${BRANCH}" = "refs/heads/main" ]; then
            WORKSPACE="prod"
            TF_VAR_FILE="prod.tfvars"

          else
            echo "Unsupported branch: ${BRANCH}"
            exit 1
          fi

          echo "Workspace: ${WORKSPACE}"
          echo "TFVars: ${TF_VAR_FILE}"

          terraform workspace select "${WORKSPACE}"

          terraform workspace show

          terraform apply \
            -input=false \
            -auto-approve \
            -var-file="${TF_VAR_FILE}"

