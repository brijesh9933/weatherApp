name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - dev
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - dev

jobs:
  quality_gates:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Quality gates (lint + tests + coverage + sonar)

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint:check

      - name: Unit tests with coverage
        run: |
          npm test -- --watch=false --browsers=ChromeHeadless --code-coverage

          echo "Checking LCOV output..."
          if [ ! -f coverage/weather/lcov.info ]; then
            echo "ERROR: coverage/weather/lcov.info not found. Listing coverage dir:";
            ls -R coverage || true;
            exit 1;
          fi

          echo "Coverage check already enforced by npm run coverage:check in next step."

      - name: Coverage gate (>=80%)
        run: npm run coverage:check


      - name: SonarCloud Scan
        uses: sonarsource/sonarcloud-github-action@master
        env:
          GITHUB_ACTIONS: "false"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >-
            -Dsonar.projectBaseDir=.
            -Dsonar.organization=brijesh9933
            -Dsonar.projectKey=brijesh9933_weatherApp
            -Dsonar.sources=src
            -Dsonar.tests=src
            -Dsonar.test.inclusions=src/**/*.spec.ts
            -Dsonar.coverage.exclusions=**/node_modules/**
            -Dsonar.inclusions=src/**
            -Dsonar.javascript.lcov.reportPaths=coverage/weather/lcov.info

  build_and_deploy_job:
    needs: quality_gates
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GRAY_MEADOW_0312EC610 }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          app_location: "/" # App source code path
          api_location: "" # Api source code path - optional
          output_location: "dist/weather" # Built app content directory - optional

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_GRAY_MEADOW_0312EC610 }}
          action: "close"
          app_location: "/"

